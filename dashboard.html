<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>LT Planning – Admin Dashboard</title>
  <style>
    :root{--bg:#0b1220; --card:#121a2b; --muted:#9fb0d0; --text:#e9f0ff; --brand:#4da3ff; --brand2:#8a5bff; --line:rgba(255,255,255,.08); --shadow:0 12px 40px rgba(0,0,0,.35); --radius:16px; --sans: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial;}
    *{box-sizing:border-box}
    body{margin:0; font-family:var(--sans); color:var(--text); background: radial-gradient(1200px 800px at 20% 0%, rgba(77,163,255,.18), transparent 55%), radial-gradient(900px 700px at 90% 10%, rgba(138,91,255,.18), transparent 55%), var(--bg); min-height:100vh;}
    header{max-width:1200px; margin:0 auto; padding:22px 16px 10px; display:flex; justify-content:space-between; align-items:center; gap:12px;}
    .card{max-width:1200px; margin:0 auto; background:linear-gradient(180deg, rgba(255,255,255,.06), rgba(255,255,255,.03)); border:1px solid var(--line); border-radius:var(--radius); box-shadow:var(--shadow); padding:16px;}
    .row{display:flex; gap:10px; align-items:center; flex-wrap:wrap;}
    .btn{appearance:none; border:0; cursor:pointer; padding:10px 14px; border-radius:12px; font-weight:800; letter-spacing:.2px; text-decoration:none;}
    .btn.primary{background:linear-gradient(135deg,var(--brand),var(--brand2)); color:#061021;}
    .btn.secondary{background:rgba(255,255,255,.08); color:var(--text); border:1px solid var(--line);}
    input{padding:10px 12px; border-radius:12px; border:1px solid var(--line); background:rgba(0,0,0,.22); color:var(--text);}
    table{width:100%; border-collapse:separate; border-spacing:0; overflow:hidden; border-radius:14px; border:1px solid var(--line); margin-top:12px;}
    th,td{padding:10px 10px; font-size:12px; border-bottom:1px solid var(--line);}
    th{color:#cfe0ff; text-align:left; background:rgba(255,255,255,.05); position:sticky; top:0;}
    tbody tr:hover td{background:rgba(255,255,255,.03)}
    .help{font-size:12px; color:var(--muted); line-height:1.5}
  </style>
</head>
<body>
  <header>
    <div>
      <h1 style="margin:0; font-size:18px;">Admin Dashboard</h1>
      <div class="help" id="me">Only planning.lt.networks@gmail.com can use this page.</div>
    </div>
    <div class="row">
      <a class="btn secondary" href="index.html">Back</a>
      <button class="btn secondary" id="refreshBtn" type="button">Refresh</button>
      <button class="btn secondary" id="signOutBtn" type="button">Sign Out</button>
    </div>
  </header>

  <div class="card">
    <div class="row" style="justify-content:space-between;">
      <div class="help" id="status">Loading…</div>
      <div class="row"><input id="filter" placeholder="Filter by email" /></div>
    </div>

    <table id="table" style="display:none;">
      <thead>
        <tr><th>Email</th><th>Projects done</th><th>Credit</th><th>Update</th></tr>
      </thead>
      <tbody id="tbody"></tbody>
    </table>
  </div>

  <script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';

    const CONFIG = {
      supabaseUrl: 'https://nvbfzyuttbypwsmcjmaf.supabase.co',
      supabaseAnonKey: 'sb_publishable_EA-cnDQySiGVKi4XYfSYDA_HX4UBiHE',
    };
    const ADMIN_EMAIL = 'planning.lt.networks@gmail.com'.toLowerCase();

    const supabase = createClient(CONFIG.supabaseUrl, CONFIG.supabaseAnonKey);

    const tbody = document.getElementById('tbody');
    const filter = document.getElementById('filter');
    const status = document.getElementById('status');
    const table = document.getElementById('table');

    async function requireSession(){
      const { data: { session } } = await supabase.auth.getSession();
      if(!session){
        status.textContent='No session. Go to index.html and sign in.';
        throw new Error('No session');
      }
      const email = (session.user.email||'').toLowerCase();
      document.getElementById('me').textContent = `Signed in: ${session.user.email}`;
      if(email !== ADMIN_EMAIL){
        status.textContent = 'Access denied: Admin only.';
        throw new Error('Not admin');
      }
      return session;
    }

    async function loadUsers(){
      await requireSession();
      const { data, error } = await supabase.functions.invoke('admin-users', { body: { action: 'list' } });
      if(error) throw error;
      if(data?.error) throw new Error(data.error);
      return data.users || [];
    }

    function render(users){
      const q=(filter.value||'').trim().toLowerCase();
      const list=q?users.filter(u=>String(u.email).toLowerCase().includes(q)):users;
      tbody.innerHTML='';
      for(const u of list){
        const tr=document.createElement('tr');
        tr.innerHTML=`
          <td>${u.email}</td>
          <td>${u.projects_done ?? 0}</td>
          <td>${u.credit ?? 0}</td>
          <td>
            <div style="display:flex; gap:8px; align-items:center;">
              <input type="number" min="0" step="1" value="${u.credit ?? 0}" style="width:110px" />
              <button class="btn primary" type="button">Save</button>
            </div>
          </td>
        `;
        const input=tr.querySelector('input');
        const btn=tr.querySelector('button');
        btn.addEventListener('click', async ()=>{
          btn.disabled=true;
          try{
            const { data, error } = await supabase.functions.invoke('admin-users', { body: { action:'set_credit', email: u.email, credit: Number(input.value) } });
            if(error) throw error;
            if(data?.error) throw new Error(data.error);
            u.credit=Number(input.value);
          } catch(e){ alert(String(e)); }
          finally{ btn.disabled=false; }
        });
        tbody.appendChild(tr);
      }
    }

    let cache=[];
    async function refresh(){
      try{
        status.textContent='Loading users…';
        cache=await loadUsers();
        table.style.display='table';
        status.textContent=`Loaded ${cache.length} users.`;
        render(cache);
      }catch(e){
        console.error(e);
        table.style.display='none';
      }
    }

    document.getElementById('refreshBtn').addEventListener('click', refresh);
    document.getElementById('signOutBtn').addEventListener('click', async ()=>{ await supabase.auth.signOut(); location.href='index.html'; });
    filter.addEventListener('input', ()=> render(cache));

    await refresh();
  </script>
</body>
</html>
