<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>LT Planning – Results</title>
  <style>
    :root{--bg:#070d18; --card:#111a2b; --muted:#9fb0d0; --text:#e9f0ff; --brand:#4da3ff; --brand2:#8a5bff; --line:rgba(255,255,255,.08); --shadow: 0 12px 40px rgba(0,0,0,.35); --radius:16px; --sans: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial;}
    *{box-sizing:border-box}
    body{margin:0; font-family:var(--sans); color:var(--text); background: radial-gradient(1200px 800px at 20% 0%, rgba(77,163,255,.18), transparent 55%), radial-gradient(900px 700px at 90% 10%, rgba(138,91,255,.18), transparent 55%), var(--bg); min-height:100vh;}
    header{max-width:1280px; margin:0 auto; padding:22px 16px 10px; display:flex; gap:12px; align-items:center; justify-content:space-between;}
    .btn{appearance:none; border:0; cursor:pointer; padding:10px 14px; border-radius:12px; background: linear-gradient(135deg, var(--brand), var(--brand2)); color:#061021; font-weight:800; text-decoration:none;}
    .btn.secondary{background: rgba(255,255,255,.08); color:var(--text); border:1px solid var(--line)}
    main{max-width:1280px; margin:0 auto; padding:16px; display:grid; gap:14px;}
    .card{background: linear-gradient(180deg, rgba(255,255,255,.06), rgba(255,255,255,.03)); border:1px solid var(--line); border-radius: var(--radius); box-shadow: var(--shadow); padding:14px;}
    h1{margin:0; font-size:18px}
    h2{margin:0 0 10px; font-size:14px; color:#dfe9ff}
    .help{font-size:12px; color:var(--muted); margin:6px 0 0; line-height:1.5}
    .badge{display:inline-flex; gap:8px; align-items:center; padding:8px 10px; border:1px solid var(--line); border-radius:999px; background:rgba(0,0,0,.18); font-size:12px; color:var(--muted)}
    .badge strong{color:var(--text)}
    #drawingWrap{overflow-x:auto; overflow-y:visible; border:1px solid var(--line); border-radius:14px; background:rgba(0,0,0,.12); padding:10px;}
    svg{max-width:100%; height:auto;}
    table{width:100%; border-collapse:separate; border-spacing:0; overflow:hidden; border-radius:14px; border:1px solid var(--line);}
    th,td{padding:10px 10px; font-size:12px; border-bottom:1px solid var(--line);}
    th{color:#cfe0ff; text-align:left; background:rgba(255,255,255,.05);}
    tbody tr:last-child td{border-bottom:0}
  </style>
</head>
<body>
  <header>
    <div>
      <h1>LT Planning – Results</h1>
      <div class="help" id="meta"></div>
    </div>
    <div style="display:flex; gap:10px; flex-wrap:wrap; justify-content:flex-end;">
      <a class="btn secondary" href="index.html">Back</a>
    </div>
  </header>

  <main>
    <section class="card">
      <h2>Summary</h2>
      <div id="summary"></div>
    </section>

    <section class="card">
      <h2>Load Table</h2>
      <div style="overflow:auto;">
        <table id="loadTable"></table>
      </div>
    </section>

    <section class="card">
      <h2>BOQ</h2>
      <div style="overflow:auto;">
        <table id="boqTable"></table>
      </div>
    </section>

    <section class="card">
      <h2>Drawing</h2>
      <div id="drawingWrap"><svg id="drawing" viewBox="0 0 1400 800" xmlns="http://www.w3.org/2000/svg"></svg></div>
      <p class="help">Sections auto-extend; the drawing starts after the tables.</p>
    </section>
  </main>

  <script type="module">
    const NS = location.pathname.replace(/\/+$/, '');
    const results = (()=>{ try{return JSON.parse(localStorage.getItem(`${NS}:results`))}catch{return null} })();
    const inputs = (()=>{ try{return JSON.parse(localStorage.getItem(`${NS}:inputs`))}catch{return null} })();

    const meta = document.getElementById('meta');
    if(!results){
      meta.textContent = 'No results found. Go back and Run again.';
    } else {
      meta.innerHTML = `Request: <span class="badge"><strong>${inputs?.form?.reqNo || '—'}</strong></span>`;
    }

    const summaryDiv = document.getElementById('summary');
    if(results?.summary){
      const s = results.summary;
      summaryDiv.innerHTML = `
        <div class="help">Feed: <strong>${s.feedFrom ?? ''}</strong> • Cables: <strong>${s.cablesCountString ?? ''}</strong> • ReqLoadA: <strong>${Number(s.reqLoadA ?? 0).toFixed(2)}</strong> • kVA: <strong>${Number(s.reqLoadKVA ?? 0).toFixed(2)}</strong></div>
      `;
    }

    function renderTable(el, rows){
      if(!Array.isArray(rows) || rows.length===0){ el.innerHTML='<tr><td class="help">No data</td></tr>'; return; }
      const cols = Object.keys(rows[0]);
      const thead = `<thead><tr>${cols.map(c=>`<th>${c}</th>`).join('')}</tr></thead>`;
      const tbody = `<tbody>${rows.map(r=>`<tr>${cols.map(c=>`<td>${r[c] ?? ''}</td>`).join('')}</tr>`).join('')}</tbody>`;
      el.innerHTML = thead + tbody;
    }

    renderTable(document.getElementById('loadTable'), results?.loadTable || []);
    renderTable(document.getElementById('boqTable'), results?.boqTable || []);

    const svg = document.getElementById('drawing');
    const el = (name, attrs={})=>{ const n=document.createElementNS('http://www.w3.org/2000/svg', name); for(const [k,v] of Object.entries(attrs)) if(v!==null) n.setAttribute(k,String(v)); return n; };

    function renderDrawing(model){
      if(!model) return;
      svg.setAttribute('viewBox', `0 0 ${model.width} ${model.height}`);
      svg.innerHTML='';
      svg.appendChild(el('rect',{x:0,y:0,width:model.width,height:model.height,fill:'#fff'}));
      for(const s of (model.shapes||[])){
        if(s.kind==='rect') svg.appendChild(el('rect',{x:s.x,y:s.y,width:s.w,height:s.h,fill:'none',stroke:s.stroke||'#111','stroke-width':2}));
        if(s.kind==='line') svg.appendChild(el('line',{x1:s.x1,y1:s.y1,x2:s.x2,y2:s.y2,stroke:s.stroke||'#111','stroke-width':s.w||2}));
        if(s.kind==='circle') svg.appendChild(el('circle',{cx:s.cx,cy:s.cy,r:s.r,fill:'none',stroke:'#111','stroke-width':2}));
        if(s.kind==='textbox'){
          const g=el('g',{});
          g.appendChild(el('rect',{x:s.x,y:s.y,width:s.w,height:s.h,fill:'none',stroke:'#e11d48','stroke-width':1.6}));
          const t=el('text',{x:s.x+s.w/2,y:s.y+s.h/2-4,'text-anchor':'middle','font-size':12,'font-family':'Arial',fill:'#111'});
          String(s.text||'').split('\n').forEach((ln,i)=>{ const ts=el('tspan',{x:s.x+s.w/2,dy:i===0?0:14}); ts.textContent=ln; t.appendChild(ts); });
          g.appendChild(t); svg.appendChild(g);
        }
      }
    }

    renderDrawing(results?.drawing);
  </script>
</body>
</html>
