<!DOCTYPE html>
<html>
<head>
  <title>Simple Auth System</title>
</head>
<body>

<h2>Sign Up</h2>
<input type="text" id="signupUser" placeholder="Enter Username"><br><br>
<input type="text" id="signupMac" placeholder="Enter MAC Address"><br><br>
<button onclick="signUp()">Sign Up</button>

<hr>

<h2>Sign In</h2>
<input type="text" id="signinUser" placeholder="Enter Username"><br><br>
<input type="text" id="signinValue" placeholder="Enter Value"><br><br>
<button onclick="signIn()">Sign In</button>

<hr>

<h3>Response:</h3>
<div id="result"></div>

<script>

const signupURL = "https://script.google.com/macros/s/AKfycby5kLzyfAhNGqF-I0HkjvcKXcDlr4XgzhWeyfxAcJf9veabDkP2bivT_waUDa_7y6S34w/exec";
const signinURL = "https://script.google.com/macros/s/AKfycbyLZdgnhcErwev8SsidSTxcB4RUqnZK5czrT_mZd6WW1kFWh6dJsx_wNeMnBwFenRRT/exec";


// ✅ SIGN UP
async function signUp() {
  const user = document.getElementById("signupUser").value;
  const mac = document.getElementById("signupMac").value;

  const params = new URLSearchParams();
  params.append("searchValue", user);
  params.append("macAddress", mac);

  const res = await fetch(signupURL, {
    method: "POST",
    body: params
  });

  const text = await res.text();
  document.getElementById("result").innerText = text;
}


// ✅ SIGN IN
async function signIn() {
  const user = document.getElementById("signinUser").value;
  const value = document.getElementById("signinValue").value;

  const params = new URLSearchParams();
  params.append("searchValue", user);
  params.append("updateValue", value);

  const res = await fetch(signinURL, {
    method: "POST",
    body: params
  });

  const text = await res.text();
  document.getElementById("result").innerText = text;
}

</script>

</body>
</html>
